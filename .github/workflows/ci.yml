name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly rebuild catches upstream toolchain / mirror drift even when
    # nobody's pushing code.
    - cron: '0 7 * * 1'
  workflow_dispatch:

# Prevent concurrent duplicate runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build minimal.iso
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: checkout jvmlab-build
        uses: actions/checkout@v4
        with:
          path: jvmlab-build

      - name: checkout jvmlab-lsh (sibling, for LSH_LOCAL)
        uses: actions/checkout@v4
        with:
          repository: LilOleByte/jvmlab-lsh
          path: jvmlab-lsh

      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential cpio flex gzip libelf-dev libssl-dev \
            musl-tools wget xorriso

      - name: cache upstream tarballs
        uses: actions/cache@v4
        with:
          path: |
            jvmlab-build/kernel.tar.xz
            jvmlab-build/syslinux.tar.xz
          # Keyed on the pinned checksums so any version bump bypasses
          # the stale cache automatically.
          key: tarballs-${{ hashFiles('jvmlab-build/minimal.sh') }}

      - name: build minimal.iso
        working-directory: jvmlab-build
        run: ./minimal.sh

      - name: artefact info
        working-directory: jvmlab-build
        # Generate a human-readable summary of what just got built:
        # digests (reproducibility anchor), sizes, ISO metadata,
        # kernel file(1) ident, and initramfs file list. Written to
        # both the CI job summary (for easy reading in the GitHub UI)
        # and to artefact-info.md inside the uploaded artifact.
        # set +e on the informational subcommands so a non-fatal
        # warning (e.g. xorriso stderr chatter) can't mask the build.
        run: |
          sha256sum minimal.iso isoimage/rootfs.gz isoimage/bzImage \
            > artefact-digests.txt

          {
            echo "### jvmlab build summary"
            echo
            echo "- commit:           \`${GITHUB_SHA}\`"
            echo "- ref:              \`${GITHUB_REF}\`"
            echo "- runner:           \`${RUNNER_OS} ${RUNNER_ARCH}\`"
            echo "- build date (UTC): \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
            echo
            echo "#### SHA256 digests"
            echo '```'
            cat artefact-digests.txt
            echo '```'
            echo
            echo "#### Sizes"
            echo '```'
            ls -lh minimal.iso isoimage/rootfs.gz isoimage/bzImage \
              | awk '{printf "%-10s  %s\n", $5, $NF}' || true
            echo '```'
            echo
            echo "#### ISO metadata (PVD)"
            echo '```'
            xorriso -indev minimal.iso -pvd_info 2>/dev/null || true
            echo '```'
            echo
            echo "#### Kernel identity"
            echo '```'
            file isoimage/bzImage || true
            echo '```'
            echo
            echo "#### Initramfs contents"
            echo '```'
            zcat isoimage/rootfs.gz | cpio -t 2>/dev/null | sort || true
            echo '```'
          } | tee artefact-info.md >> "$GITHUB_STEP_SUMMARY"

      - name: upload ISO + info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvmlab-iso-${{ github.sha }}
          path: |
            jvmlab-build/minimal.iso
            jvmlab-build/artefact-digests.txt
            jvmlab-build/artefact-info.md
          if-no-files-found: warn
          retention-days: 14
